"$schema" = 'https://starship.rs/config-schema.json'

format = """\
[в•ӯв•ҙ](fg:surface2)\
$directory\
(\
    $git_branch\
    $git_status\
)\
$cmd_duration $fill (\
    $gleam\
    $python\
    $c\
    $golang\
    $rust\
    $nodejs\
) 
[в•°в”Җ](fg:surface2)$character\
"""

# Disables the blank line at the start of the prompt
add_newline = true

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[fill]
symbol = ' '

[character]
success_symbol = "[пғҡ](fg:overlay1)"
error_symbol = "[пғҡ](fg:maroon)"

[directory]
format = " [оӮ¶](fg:peach)[пҒј  $path ]($style)[$read_only]($read_only_style)[оӮҙ](fg:peach)"
truncation_length = 2
style = "fg:crust bg:peach"
read_only_style = "fg:crust bg:peach"
before_repo_root_style = "fg:curst bg:peach"
truncation_symbol = "вҖҰ/"
truncate_to_repo = true
read_only = " о©ө "

[cmd_duration]
format = " [оӮ¶](fg:lavender)[$duration]($style)[оӮҙ](fg:lavender)"
style = "fg:crust bg:lavender"
min_time = 500

[git_branch]
format = " [оӮ¶](fg:surface1)[$symbol$branch](fg:subtext1 bg:surface1)"
symbol = "пҗҳ "

[git_status]
format = "[ $all_status$ahead_behind](bg:surface1 fg:maroon)[оӮҙ](fg:surface1)"

[docker_context]
disabled = true
symbol = "пҢҲ "

[package]
disabled = true

[nodejs]
format = "[ оӮ¶](fg:green)[$symbol$version]($style)[оӮҙ](fg:green)"
style = "bg:green fg:crust"
symbol = "оңҳ "
version_format = "${raw}"
disabled = false

[golang]
format = "[ оӮ¶](fg:sky)[$symbol$version](bg:sky fg:crust)[оӮҙ](fg:sky)"
symbol = "оҳ§ "
version_format = "${raw}"
disabled = false

[rust]
format = "[ оӮ¶](fg:maroon)[$symbol$version](bg:maroon fg:crust)[оӮҙ](fg:maroon)"
symbol = "оҡӢ "
version_format = "${raw}"
disabled = false

[gleam]
format = "[ оӮ¶](fg:pink)[$symbol$version]($style)[оӮҙ](fg:pink)"
style = "bg:pink fg:crust"
symbol = "пҖ… "
disabled = false

[c]
format = "[ оӮ¶](fg:clang)[$symbol($version(-$name) )](bg:clang fg:text_color)[оӮҙ](fg:clang)"
symbol = "оҳһ "
version_format = "${raw}"
disabled = true
